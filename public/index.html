<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#fff3e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>myHabbit — UI isolation 9.7</title>
  <link rel="stylesheet" href="/styles.css?v=97-ui-isolation-20260723">
  <style>
    .diag97{position:fixed;left:10px;right:10px;bottom:10px;z-index:99999;padding:10px 12px;border-radius:14px;background:rgba(31,34,41,.92);color:#fff;font:600 12px/1.35 system-ui,sans-serif;box-shadow:0 8px 30px rgba(0,0,0,.22)}
    .diag97.ok{background:rgba(37,126,83,.94)}
    .diag97.error{background:rgba(164,44,44,.96)}
    .ui97-note{margin:12px 0 18px;padding:12px 14px;border:1px dashed rgba(128,94,70,.25);border-radius:16px;background:rgba(255,255,255,.55);font-size:13px}
    .ui97-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  </style>
</head>
<body>
  <div id="appSplash" class="app-splash" role="status" aria-label="Завантаження myHabbit">
    <img src="/assets/myhabbit-brand.webp" alt="myHabbit">
    <strong>myHabbit</strong>
    <span>Перевіряємо тільки інтерфейс…</span>
  </div>
  <div id="app"></div>
  <div id="toast" class="toast" aria-live="polite"></div>
  <div id="diag97" class="diag97">9.7: HTML завантажено, очікуємо boot97.js…</div>
  <script src="/boot97.js?v=97-ui-isolation-20260723" defer></script>
  <script>
    window.setTimeout(function(){
      var d=document.getElementById('diag97');
      if(d && !window.__MYHABBIT_97_BOOTED__){
        d.className='diag97 error';
        d.textContent='9.7 ПОМИЛКА: boot97.js не запустився або не завантажився.';
        var s=document.getElementById('appSplash'); if(s){s.style.display='none';}
      }
    },5000);
  </script>
</body>
</html>
