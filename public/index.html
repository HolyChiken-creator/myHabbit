<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#fff3e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="myHabbit">
  <meta name="description" content="myHabbit — сімейна система спільних квестів, навичок, досягнень і реальних нагород.">
  <link rel="manifest" href="/manifest.webmanifest?v=95">
  <link rel="stylesheet" href="/styles.css?v=95-safe-boot">
  <title>myHabbit</title>
  <script>
    window.__MYHABBIT_BOOT_STARTED__=Date.now();
    window.addEventListener('error',function(e){
      var app=document.getElementById('app');
      if(app&&!app.innerHTML.trim()) app.innerHTML='<main style="padding:24px;font-family:system-ui"><h2>myHabbit не зміг запуститися</h2><p style="white-space:pre-wrap;color:#8b2b2b">'+String(e.message||'Невідома помилка')+'</p></main>';
      document.getElementById('appSplash')?.classList.add('hidden');
    });
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js" async></script>
</head>
<body>
  <div id="appSplash" class="app-splash" role="status" aria-label="Завантаження myHabbit">
    <img src="/assets/myhabbit-brand.webp" alt="myHabbit">
    <strong>myHabbit</strong>
    <span>Разом ростемо. Разом досягаємо.</span>
  </div>
  <div id="app"><main style="padding:24px;font-family:system-ui"><h2>Запуск myHabbit…</h2><p>Готуємо локальні дані.</p></main></div>
  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="/app.js?v=95-safe-boot"></script>
  <script>
    setTimeout(function(){
      document.getElementById('appSplash')?.classList.add('hidden');
      var app=document.getElementById('app');
      if(app && !app.innerHTML.trim()) app.innerHTML='<main style="padding:24px;font-family:system-ui"><h2>Інтерфейс не намалювався</h2><p>Основний JavaScript не виконався. Відкрийте цю сторінку ще раз після очищення кешу.</p></main>';
    },2500);
  </script>
</body>
</html>
