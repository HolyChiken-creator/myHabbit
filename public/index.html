<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#fff3e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="myHabbit">
  <meta name="description" content="myHabbit — сімейна система спільних квестів, навичок, досягнень і реальних нагород.">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="shortcut icon" href="/icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
  <link rel="apple-touch-startup-image" href="/assets/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/assets/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/assets/splash-1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/assets/splash-828x1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="stylesheet" href="/styles.css?v=60s93">
  <title>myHabbit</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="appSplash" class="app-splash" role="status" aria-label="Завантаження myHabbit">
    <img src="/assets/myhabbit-brand.webp" alt="myHabbit — щаслива пара серед хмар">
    <strong>myHabbit</strong>
    <span id="splashStatus">Готуємо автономну версію…</span><div class="splash-progress" aria-hidden="true"><i id="splashProgressBar"></i></div><small id="splashProgressText">0%</small>
  </div>
  <div id="app"></div>
  <div id="toast" class="toast" aria-live="polite"></div>
  <script>
  // Recovery watchdog: an old Service Worker must never keep the splash screen forever.
  window.__myHabbitBootWatchdog = setTimeout(function () {
    var splash = document.getElementById('appSplash');
    var status = document.getElementById('splashStatus');
    var bar = document.getElementById('splashProgressBar');
    var text = document.getElementById('splashProgressText');
    if (status) status.textContent = 'Запускаємо застосунок…';
    if (bar) bar.style.width = '100%';
    if (text) text.textContent = '100%';
    if (splash) splash.classList.add('hidden');
  }, 4000);
</script>
<script src="/app.js?v=60s93" defer onerror="document.getElementById('splashStatus').textContent='Не вдалося завантажити app.js. Перевірте, що файл public/app.js завантажений на сервер.'"></script>
</body>
</html>
